AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Lambda durable function + EventBridge schedule for conditional resource switching.
  Deploy with: sam build && sam deploy

Parameters:
  MainStackName:
    Type: String
    Default: scheduled-switch-main
    Description: Name of the main stack (stack.yaml) that this Lambda will control.

  PauseSeconds:
    Type: Number
    Default: 43200
    Description: Seconds to keep the resource switched on (default 12 hours = 43200).

  AlertTopicArn:
    Type: String
    Description: SNS topic ARN to notify on CloudFormation stack update failures. Leave empty to skip alerting.
    Default: ""

Conditions:
  HasAlertTopic: !Not [!Equals [!Ref AlertTopicArn, ""]]

Resources:
  SwitchFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-switch"
      Runtime: python3.14
      Architectures:
        - arm64
      Handler: handler.handler
      CodeUri: lambda/
      Timeout: 900
      Environment:
        Variables:
          STACK_NAME: !Ref MainStackName
          PAUSE_SECONDS: !Ref PauseSeconds
      # AutoPublishAlias publishes a version and creates an alias automatically.
      # Durable functions cannot be invoked against $LATEST — the alias ARN is required.
      AutoPublishAlias: live
      # DurableConfig enables durable execution — changes here force resource replacement,
      # so set ExecutionTimeout generously upfront.
      DurableConfig:
        ExecutionTimeout: 86400     # 24 hours max execution (covers 12h pause + overhead)
        RetentionPeriodInDays: 7
      Policies:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicDurableExecutionRolePolicy
        - Statement:
            - Effect: Allow
              Action:
                - cloudformation:UpdateStack
                - cloudformation:DescribeStacks
              Resource:
                - !Sub "arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${MainStackName}/*"
            # SSM permissions allow CloudFormation to create/delete SSM parameters
            # when it processes stack updates using this Lambda's role (no explicit CFN role set).
            - Effect: Allow
              Action:
                - ssm:PutParameter
                - ssm:DeleteParameter
              Resource:
                - !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/scheduled-switch/${MainStackName}/*"
      Events:
        DailyScheduleV2:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: "cron(0 8 * * ? *)"
            ScheduleExpressionTimezone: "Europe/Amsterdam"
            FlexibleTimeWindow:
              Mode: "OFF"

  # EventBridge rule: alerts on CloudFormation stack update failures for the main stack.
  # Catches UPDATE_ROLLBACK_IN_PROGRESS (earliest signal of a failed update) and
  # UPDATE_ROLLBACK_FAILED (stuck — manual intervention required).
  StackFailureRule:
    Type: AWS::Events::Rule
    Condition: HasAlertTopic
    Properties:
      Name: !Sub "${AWS::StackName}-stack-failure"
      Description: !Sub "Alerts when ${MainStackName} stack update fails"
      EventPattern:
        source:
          - aws.cloudformation
        detail-type:
          - CloudFormation Stack Status Change
        detail:
          stack-id:
            - prefix: !Sub "arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${MainStackName}/"
          status-details:
            current-status:
              - UPDATE_ROLLBACK_IN_PROGRESS
              - UPDATE_ROLLBACK_FAILED
      State: ENABLED
      Targets:
        - Id: AlertTopic
          Arn: !Ref AlertTopicArn

Outputs:
  FunctionArn:
    Value: !Ref SwitchFunction.Alias
    Description: ARN of the Lambda alias to invoke for manual testing.
