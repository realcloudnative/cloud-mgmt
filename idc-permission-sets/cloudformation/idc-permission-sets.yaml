AWSTemplateFormatVersion: "2010-09-09"
Description: >
  IAM Identity Center permission sets for a single management-account operator.
  One human / one IdC user, two deliberately-assumed hats:
    * CloudOps  — everyday control-plane work (Organizations/SCPs, Budgets,
                  CloudFormation, account baseline). Cannot run workloads,
                  cannot administer Identity Center.
    * IdentityAdmin — rare, powerful. Administers IdC permission sets and
                  assignments (incl. for dev/prod). Effectively org-admin;
                  assume it only when changing who can access what.
  Both are assigned ONLY to the management account, so this login never has
  direct access to dev/prod. Deploy in the MANAGEMENT account, in the region
  where your Identity Center instance is homed.

Parameters:
  IdentityCenterInstanceArn:
    Type: String
    AllowedPattern: "^arn:aws:sso:::instance/ssoins-[0-9a-f]+$"
    Description: "IdC instance ARN. Find with: aws sso-admin list-instances"

  ManagementAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: 12-digit management account id (the only assignment target).

  PrincipalId:
    Type: String
    Description: "IdC user (or group) id. Find with: aws identitystore list-users --identity-store-id <id>"

  PrincipalType:
    Type: String
    AllowedValues: ["USER", "GROUP"]
    Default: USER
    Description: Whether PrincipalId is a user or a group.

  CloudOpsSessionDuration:
    Type: String
    Default: PT4H
    Description: ISO-8601 session length for the everyday CloudOps hat.

  IdentityAdminSessionDuration:
    Type: String
    Default: PT1H
    Description: ISO-8601 session length for the powerful IdentityAdmin hat (kept short on purpose).

Resources:
  CloudOpsPermissionSet:
    Type: AWS::SSO::PermissionSet
    Properties:
      Name: CloudOpsManagement
      Description: Everyday management control plane. No workloads, no Identity Center administration.
      InstanceArn: !Ref IdentityCenterInstanceArn
      SessionDuration: !Ref CloudOpsSessionDuration
      ManagedPolicies:
        - arn:aws:iam::aws:policy/ReadOnlyAccess
      InlinePolicy: |-
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Sid": "ManageOrganizationsAndScps",
              "Effect": "Allow",
              "Action": [
                "organizations:Describe*", "organizations:List*",
                "organizations:CreatePolicy", "organizations:UpdatePolicy", "organizations:DeletePolicy",
                "organizations:AttachPolicy", "organizations:DetachPolicy",
                "organizations:EnablePolicyType", "organizations:DisablePolicyType",
                "organizations:TagResource", "organizations:UntagResource"
              ],
              "Resource": "*"
            },
            {
              "Sid": "ManageBudgetsAndCost",
              "Effect": "Allow",
              "Action": ["budgets:*", "ce:Get*", "ce:List*", "ce:Describe*", "account:Get*", "account:List*"],
              "Resource": "*"
            },
            {
              "Sid": "ManageCloudFormation",
              "Effect": "Allow",
              "Action": "cloudformation:*",
              "Resource": "*"
            },
            {
              "Sid": "ManageSetupIamRoles",
              "Effect": "Allow",
              "Action": [
                "iam:CreateRole", "iam:DeleteRole", "iam:GetRole", "iam:TagRole", "iam:UntagRole",
                "iam:PutRolePolicy", "iam:DeleteRolePolicy", "iam:GetRolePolicy", "iam:ListRolePolicies",
                "iam:AttachRolePolicy", "iam:DetachRolePolicy", "iam:ListAttachedRolePolicies",
                "iam:UpdateAssumeRolePolicy", "iam:CreateServiceLinkedRole"
              ],
              "Resource": "*"
            },
            {
              "Sid": "PassRolesOnlyToSetupServices",
              "Effect": "Allow",
              "Action": "iam:PassRole",
              "Resource": "*",
              "Condition": {
                "StringEquals": { "iam:PassedToService": ["budgets.amazonaws.com", "cloudformation.amazonaws.com"] }
              }
            },
            {
              "Sid": "ApplyAccountBaselineSettings",
              "Effect": "Allow",
              "Action": [
                "ec2:EnableEbsEncryptionByDefault", "ec2:GetEbsEncryptionByDefault", "ec2:GetEbsDefaultKmsKeyId",
                "ec2:ModifyInstanceMetadataDefaults", "ec2:GetInstanceMetadataDefaults",
                "ec2:DescribeAccountAttributes", "ec2:DescribeRegions",
                "s3:GetAccountPublicAccessBlock", "s3:PutAccountPublicAccessBlock",
                "guardduty:*"
              ],
              "Resource": "*"
            },
            {
              "Sid": "NeverRunWorkloads",
              "Effect": "Deny",
              "Action": [
                "ec2:RunInstances", "ec2:StartInstances", "ec2:CreateFleet",
                "ec2:RequestSpotInstances", "ec2:RequestSpotFleet", "ec2:RunScheduledInstances",
                "ec2:CreateNatGateway",
                "bedrock:*", "bedrock-agentcore:*", "aws-external-anthropic:*",
                "lambda:*", "ecs:*", "apprunner:*",
                "transcribe:*", "translate:*", "mediaconvert:*",
                "athena:*", "glue:*",
                "kinesis:*", "firehose:*", "kinesisanalytics:*", "kinesisvideo:*",
                "dynamodb:*", "dax:*", "elasticfilesystem:*",
                "ecr:*", "ecr-public:*", "imagebuilder:*", "states:*",
                "codebuild:*", "codedeploy:*", "codepipeline:*",
                "apigateway:*", "execute-api:*", "sagemaker:*"
              ],
              "Resource": "*"
            },
            {
              "Sid": "NoSelfEscalationViaIdentityCenter",
              "Effect": "Deny",
              "Action": [
                "sso:CreateAccountAssignment", "sso:DeleteAccountAssignment", "sso:ProvisionPermissionSet",
                "sso:PutInlinePolicyToPermissionSet", "sso:AttachManagedPolicyToPermissionSet",
                "sso:CreatePermissionSet", "sso:UpdatePermissionSet", "sso:PutPermissionsBoundaryToPermissionSet",
                "identitystore:CreateUser", "identitystore:UpdateUser", "identitystore:CreateGroupMembership"
              ],
              "Resource": "*"
            }
          ]
        }

  IdentityAdminPermissionSet:
    Type: AWS::SSO::PermissionSet
    Properties:
      Name: IdentityAdmin
      Description: Powerful, rare-use. Administers Identity Center permission sets and assignments. Effectively org-admin.
      InstanceArn: !Ref IdentityCenterInstanceArn
      SessionDuration: !Ref IdentityAdminSessionDuration
      InlinePolicy: |-
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Sid": "AdministerIdentityCenter",
              "Effect": "Allow",
              "Action": ["sso:*", "sso-directory:*", "identitystore:*"],
              "Resource": "*"
            },
            {
              "Sid": "ReadOrgContext",
              "Effect": "Allow",
              "Action": ["organizations:Describe*", "organizations:List*"],
              "Resource": "*"
            },
            {
              "Sid": "NeverRunWorkloadsFromManagement",
              "Effect": "Deny",
              "Action": [
                "ec2:RunInstances", "ec2:StartInstances", "ec2:CreateFleet",
                "ec2:RequestSpotInstances", "ec2:RequestSpotFleet", "ec2:RunScheduledInstances",
                "ec2:CreateNatGateway",
                "bedrock:*", "bedrock-agentcore:*", "aws-external-anthropic:*",
                "lambda:*", "ecs:*", "apprunner:*",
                "transcribe:*", "translate:*", "mediaconvert:*",
                "athena:*", "glue:*",
                "kinesis:*", "firehose:*", "kinesisanalytics:*", "kinesisvideo:*",
                "dynamodb:*", "dax:*", "elasticfilesystem:*",
                "ecr:*", "ecr-public:*", "imagebuilder:*", "states:*",
                "codebuild:*", "codedeploy:*", "codepipeline:*",
                "apigateway:*", "execute-api:*", "sagemaker:*"
              ],
              "Resource": "*"
            }
          ]
        }

  CloudOpsAssignment:
    Type: AWS::SSO::Assignment
    Properties:
      InstanceArn: !Ref IdentityCenterInstanceArn
      PermissionSetArn: !GetAtt CloudOpsPermissionSet.PermissionSetArn
      PrincipalId: !Ref PrincipalId
      PrincipalType: !Ref PrincipalType
      TargetId: !Ref ManagementAccountId
      TargetType: AWS_ACCOUNT

  IdentityAdminAssignment:
    Type: AWS::SSO::Assignment
    Properties:
      InstanceArn: !Ref IdentityCenterInstanceArn
      PermissionSetArn: !GetAtt IdentityAdminPermissionSet.PermissionSetArn
      PrincipalId: !Ref PrincipalId
      PrincipalType: !Ref PrincipalType
      TargetId: !Ref ManagementAccountId
      TargetType: AWS_ACCOUNT

Outputs:
  CloudOpsPermissionSetArn:
    Description: ARN of the everyday CloudOps permission set.
    Value: !GetAtt CloudOpsPermissionSet.PermissionSetArn
  IdentityAdminPermissionSetArn:
    Description: ARN of the powerful IdentityAdmin permission set.
    Value: !GetAtt IdentityAdminPermissionSet.PermissionSetArn
